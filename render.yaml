# render.yaml - Blueprint Adaptado a la Estructura Real del Proyecto

databases:
  - name: asistente-legal-db
    databaseName: asistente_legal_db
    user: asistente_legal_user
    plan: free

services:
  # Redis/KeyValue Store
  - name: asistente-legal-redis
    type: keyvalue
    ipAllowList: []
    plan: free

  # 1. El Backend (API con FastAPI)
  - name: asistente-legal-backend
    type: web
    runtime: python
    rootDir: ./backend # Correcto: Render trabajará desde la carpeta backend
    # =====================================================================
    # CORRECCIÓN CLAVE: Le decimos a pip que suba un nivel (../) para encontrar el archivo.
    # =====================================================================
    buildCommand: "pip install -r ../requirements.txt"
    startCommand: "uvicorn main:aplicacion --host 0.0.0.0 --port $PORT"
    healthCheckPath: /api/chat/healthcheck
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: asistente-legal-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: asistente-legal-redis
          type: keyvalue
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.5
      - key: CORS_ORIGINS
        value: "" 
      - key: GOOGLE_API_KEY
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false

  # 2. El Worker de Celery para Tareas Asíncronas
  - name: celery-worker
    type: worker
    runtime: python
    rootDir: ./backend # Correcto: El worker también opera desde la carpeta backend
    # =====================================================================
    # CORRECCIÓN CLAVE: Aplicamos la misma corrección de ruta aquí.
    # =====================================================================
    buildCommand: "pip install -r ../requirements.txt"
    startCommand: "celery -A tareas.celery_app worker --loglevel=info"
    plan: starter
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: asistente-legal-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: asistente-legal-redis
          type: keyvalue
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.5
      - key: GOOGLE_API_KEY
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false

  # 3. El Frontend (Sitio Estático con React+Vite)
  - name: asistente-legal-frontend
    type: web
    runtime: static
    rootDir: ./frontend # Correcto: El frontend se construye desde su propia carpeta
    buildCommand: "npm install && npm run build"
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_URL_BASE_BACKEND
        value: ""
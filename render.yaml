# render.yaml - Versión corregida para producción

# --- GRUPO DE VARIABLES DE ENTORNO (Secrets) ---
# =====================================================================
# Centralizamos las claves secretas en un grupo para que estén disponibles en build.
# =====================================================================
envVarGroups:
  - name: secrets
    envVars:
      - key: GOOGLE_API_KEY
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false

# --- BASE DE DATOS POSTGRESQL ---
databases:
  - name: asistente-legal-db
    databaseName: asistente_legal_db
    user: asistente_legal_user
    plan: free

# --- SERVICIOS ---
services:
  # 1. Backend (FastAPI + Uvicorn)
  - name: asistente-legal-backend
    type: web
    runtime: python
    buildCommand: |
      # Instalar dependencias del sistema para audio/video
      sudo apt-get update && sudo apt-get install -y ffmpeg libsndfile1
      pip install -r requirements.txt
    startCommand: |
      rm -rf backend/archivos_subidos/* && 
      rm -rf chroma_db_data && 
      python -m backend.scripts.ingestar_documentos && 
      uvicorn backend.main:aplicacion --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/chat/healthcheck
    plan: free
    envVars:
      - fromGroup: secrets
      - key: DATABASE_URL
        fromDatabase:
          name: asistente-legal-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.5
      - key: CORS_ORIGINS
        value: "https://asistente-legal-frontend-8n9i.onrender.com,http://localhost:5173,http://127.0.0.1:5173"
      # Variables para manejo de espera de base de datos
      - key: WAIT_FOR_DB
        value: "true"
      - key: MAX_DB_RETRIES
        value: "30"
      - key: DB_RETRY_DELAY
        value: "2"

  # 3. Frontend (React + Vite)
  - name: asistente-legal-frontend
    type: web
    runtime: static
    rootDir: ./frontend
    buildCommand: "npm install && npm run build"
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_URL_BASE_BACKEND
        value: "https://asistente-legal-backend-71ft.onrender.com"
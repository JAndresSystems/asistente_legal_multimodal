# render.yaml - Blueprint para el Asistente Legal Multimodal (Versión Estructuralmente Correcta)
# ================================================================
# CAMBIO ESTRUCTURAL: Las bases de datos se definen aquí, fuera de "services".
# ================================================================
databases:
  - name: asistente-legal-db
    databaseName: asistente_legal_db # Nombre interno de la BD
    user: asistente_legal_user
# ================================================================
# Los servicios de la aplicación (backend, worker, frontend) van aquí.
# Redis/KeyValue se mueve a 'services' con tipo correcto.
# ================================================================
services:
  # Redis/KeyValue Store (movid de 'previews' a aquí)
  - name: asistente-legal-redis
    type: keyvalue
    ipAllowList: []  # Bloquea acceso externo; ajusta según necesites (e.g., ['0.0.0.0/0'] para acceso total)
  # 1. El Backend (API con FastAPI)
  - name: asistente-legal-backend
    type: web
    runtime: python  # O usa 'env: python' si prefieres el campo deprecated
    rootDir: ./backend
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:aplicacion --host 0.0.0.0 --port $PORT"
    healthCheckPath: /api/chat/healthcheck
    envVars:
      - key: DATABASE_URL
        # AHORA SE USA 'fromDatabase' para referenciar la BD
        fromDatabase:
          name: asistente-legal-db
          property: connectionString
      - key: REDIS_URL
        # USA 'fromService' para referenciar KeyValue/Redis (no 'fromPreview')
        fromService:
          name: asistente-legal-redis
          type: keyvalue
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.5
      - key: CORS_ORIGINS
        value: "" 
      - key: GOOGLE_API_KEY
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
  # 2. El Worker de Celery para Tareas Asíncronas
  - name: celery-worker
    type: worker
    runtime: python  # O usa 'env: python'
    rootDir: ./backend
    buildCommand: "pip install -r requirements.txt"
    startCommand: "celery -A tareas.celery_app worker --loglevel=info"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: asistente-legal-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: asistente-legal-redis
          type: keyvalue
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.5
      - key: GOOGLE_API_KEY
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
  # 3. El Frontend (Sitio Estático con React+Vite)
  - name: asistente-legal-frontend
    type: web  # Corregido: usa 'web' en lugar de 'static'
    runtime: static  # Especifica 'static' aquí para sitios estáticos
    rootDir: ./frontend
    buildCommand: "npm install && npm run build"
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_URL_BASE_BACKEND
        value: ""
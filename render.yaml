# render.yaml

# --- GRUPO DE VARIABLES DE ENTORNO (Secrets) ---
# =====================================================================
# CORRECCIÓN #1: Centralizamos las claves secretas en un grupo.
# Esto las hace disponibles durante la fase de 'build', solucionando el error.
# =====================================================================
envVarGroups:
  - name: secrets
    envVars:
      - key: GOOGLE_API_KEY
        sync: false # Marcar como sensitiva
      - key: JWT_SECRET_KEY
        sync: false # Marcar como sensitiva
      - key: RESEND_API_KEY
        sync: false # Marcar como sensitiva

databases:
  - name: asistente-legal-db
    databaseName: asistente_legal_db
    user: asistente_legal_user
    plan: free

services:
  # Redis/KeyValue Store
  - name: asistente-legal-redis
    type: keyvalue
    ipAllowList: []
    plan: free

  # 1. El Backend (API con FastAPI)
  - name: asistente-legal-backend
    type: web
    runtime: python
    # Se elimina 'rootDir' para que los comandos se ejecuten desde la raíz del proyecto.
    # Esto es NECESARIO para que las importaciones relativas y las rutas de archivos funcionen.
    buildCommand: "pip install -r requirements.txt"
    # CAMBIO: Quita 'rm -rf' para no borrar datos innecesariamente; ingestión es condicional en código.
    # Si DB vacía, se reingesta; de lo contrario, salta.
    startCommand: "python -m backend.scripts.ingestar_documentos && uvicorn backend.main:aplicacion --host 0.0.0.0 --port $PORT"
    healthCheckPath: /api/chat/healthcheck
    plan: free
    envVars:
      # CORRECCIÓN #3: Referenciamos el grupo de secretos.
      - fromGroup: secrets
      - key: DATABASE_URL
        fromDatabase:
          name: asistente-legal-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: asistente-legal-redis
          type: keyvalue
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.5
      # CAMBIO: Usa URLs fijas para CORS (plantilla no resuelve consistentemente; ajusta con tu URL real de frontend)
      - key: CORS_ORIGINS
        value: "https://asistente-legal-frontend-8n9i.onrender.com,http://localhost:5173,http://127.0.0.1:5173"

  # 2. El Worker de Celery para Tareas Asíncronas
  - name: celery-worker
    type: worker
    runtime: python
    # Se elimina 'rootDir' aquí también por la misma razón.
    buildCommand: "pip install -r requirements.txt"
    # CAMBIO: No borra datos; worker usa la misma DB (ephemeral en free, pero reingesta si necesario).
    startCommand: "celery -A backend.tareas.celery_app worker --loglevel=info"
    plan: starter
    envVars:
      # CORRECCIÓN #3: Referenciamos el grupo de secretos aquí también.
      - fromGroup: secrets
      - key: DATABASE_URL
        fromDatabase:
          name: asistente-legal-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: asistente-legal-redis
          type: keyvalue
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.5

  # 3. El Frontend (Sitio Estático con React+Vite)
  - name: asistente-legal-frontend
    type: web
    runtime: static
    rootDir: ./frontend
    buildCommand: "npm install && npm run build"
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_URL_BASE_BACKEND
        # CAMBIO: URL fija del backend (ajusta si cambia el dominio).
        value: "https://asistente-legal-backend-71ft.onrender.com"
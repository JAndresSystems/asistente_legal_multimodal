# render.yaml 

databases:
  - name: asistente-legal-db
    databaseName: asistente_legal_db
    user: asistente_legal_user
    plan: free

services:
  # Redis/KeyValue Store
  - name: asistente-legal-redis
    type: keyvalue
    ipAllowList: []
    plan: free

  # 1. El Backend (API con FastAPI)
  - name: asistente-legal-backend
    type: web
    runtime: python
    # Se elimina 'rootDir' para que los comandos se ejecuten desde la raíz del proyecto.
    # Esto es NECESARIO para que las importaciones relativas y las rutas de archivos funcionen.
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn backend.main:aplicacion --host 0.0.0.0 --port $PORT"
    healthCheckPath: /api/chat/healthcheck
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: asistente-legal-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: asistente-legal-redis
          type: keyvalue
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.5
      - key: CORS_ORIGINS
        # CORREGIDO: Se usa el hostname público REAL del frontend en Render, sin espacios.
        # Esto asegura que FastAPI reciba la URL correcta para CORS.
        value: "http://localhost:5173,http://127.0.0.1:5173,https://asistente-legal-frontend-8n9i.onrender.com"
      - key: GOOGLE_API_KEY
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false

  # 2. El Worker de Celery para Tareas Asíncronas
  - name: celery-worker
    type: worker
    runtime: python
    # Se elimina 'rootDir' aquí también por la misma razón.
    buildCommand: "pip install -r requirements.txt"
    startCommand: "celery -A backend.tareas.celery_app worker --loglevel=info"
    plan: starter
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: asistente-legal-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: asistente-legal-redis
          type: keyvalue
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.5
      - key: GOOGLE_API_KEY
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false

  # 3. El Frontend (Sitio Estático con React+Vite)
  - name: asistente-legal-frontend
    type: web
    runtime: static
    rootDir: ./frontend
    buildCommand: "npm install && npm run build"
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_URL_BASE_BACKEND
        # CORREGIDO: Se usa el hostname público REAL del backend en Render, sin espacios.
        # Esto asegura que Vite resuelva la variable correctamente durante el build.
        value: "https://asistente-legal-backend-71ft.onrender.com" # Asegúrate de que este hostname sea correcto
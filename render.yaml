# render.yaml - Blueprint para el Asistente Legal Multimodal (Versión Estructuralmente Correcta)

# ================================================================
# CAMBIO ESTRUCTURAL: Las bases de datos se definen aquí, fuera de "services".
# ================================================================
databases:
  - name: asistente-legal-db
    databaseName: asistente_legal_db # Nombre interno de la BD
    user: asistente_legal_user

# ================================================================
# CAMBIO ESTRUCTURAL: Los servicios de Redis también se definen aquí.
# ================================================================
previews:
  - name: asistente-legal-redis
    type: redis

# ================================================================
# Los servicios de la aplicación (backend, worker, frontend) van aquí.
# ================================================================
services:
  # 1. El Backend (API con FastAPI)
  - name: asistente-legal-backend
    type: web
    env: python
    rootDir: ./backend
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:aplicacion --host 0.0.0.0 --port $PORT"
    healthCheckPath: /api/chat/healthcheck
    envVars:
      - key: DATABASE_URL
        # AHORA SE USA 'fromDatabase' para referenciar la BD
        fromDatabase:
          name: asistente-legal-db
          property: connectionString
      - key: REDIS_URL
        # AHORA SE USA 'fromPreview' para referenciar Redis
        fromPreview:
          name: asistente-legal-redis
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.5
      - key: CORS_ORIGINS
        value: "" 
      - key: GOOGLE_API_KEY
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false

  # 2. El Worker de Celery para Tareas Asíncronas
  - name: celery-worker
    type: worker
    env: python
    rootDir: ./backend
    buildCommand: "pip install -r requirements.txt"
    startCommand: "celery -A tareas.celery_app worker --loglevel=info"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: asistente-legal-db
          property: connectionString
      - key: REDIS_URL
        fromPreview:
          name: asistente-legal-redis
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.5
      - key: GOOGLE_API_KEY
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false

  # 3. El Frontend (Sitio Estático con React+Vite)
  - name: asistente-legal-frontend
    type: static
    rootDir: ./frontend
    buildCommand: "npm install && npm run build"
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_URL_BASE_BACKEND
        value: ""
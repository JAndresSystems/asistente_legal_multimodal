# render.yaml (Versión de Arranque - Diciembre 2025)

envVarGroups:
  - name: secrets
    envVars:
      - key: GOOGLE_API_KEY
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false

databases:
  - name: asistente-legal-db
    databaseName: asistente_legal_db
    user: asistente_legal_user
    plan: free

services:
  # 1. Backend (Cerebro)
  - name: asistente-legal-backend
    type: web
    runtime: python
    buildCommand: |
      pip install -r requirements.txt
      rm -rf chroma_db_data
      python -m backend.scripts.ingestar_documentos
    startCommand: |
      rm -rf backend/archivos_subidos/*
      python -m backend.seed_db
      uvicorn backend.main:aplicacion --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    plan: free
    envVars:
      - fromGroup: secrets
      - key: DATABASE_URL
        fromDatabase:
          name: asistente-legal-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.5
      # ESTRATEGIA DE ARRANQUE: Usamos "*" para permitir que el nuevo frontend 
      # se conecte inmediatamente sin importar qué URL le asigne Render.
      # Una vez desplegado, cambiaremos esto por la URL real por seguridad.
      - key: CORS_ORIGINS
        value: "*"

  # 2. Frontend (Rostro)
  - name: asistente-legal-frontend
    type: web
    runtime: static
    rootDir: ./frontend
    buildCommand: "npm install && npm run build"
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      # ESTRATEGIA DE ARRANQUE: Dejamos esto pendiente.
      # Render generará la URL del backend al crear el servicio.
      # El frontend cargará, pero dará error de red hasta que hagamos el PASO 4.
      - key: VITE_URL_BASE_BACKEND
        value: "https://PENDIENTE_DE_ACTUALIZAR_TRAS_DESPLIEGUE.onrender.com"
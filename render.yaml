# render.yaml (Versión Final con Health Check Corregido)

envVarGroups:
  - name: secrets
    envVars:
      - key: GOOGLE_API_KEY
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false

databases:
  - name: asistente-legal-db
    databaseName: asistente_legal_db
    user: asistente_legal_user
    plan: free

services:
  # 1. Backend (FastAPI + Uvicorn)
  - name: asistente-legal-backend
    type: web
    runtime: python
    buildCommand: |
      pip install -r requirements.txt
      rm -rf chroma_db_data
      python -m backend.scripts.ingestar_documentos
    startCommand: |
      rm -rf backend/archivos_subidos/*
      python -m backend.seed_db
      uvicorn backend.main:aplicacion --host 0.0.0.0 --port $PORT
    # --- INICIO DE LA CORRECCIÓN CLAVE ---
    # Apuntamos el health check a la ruta raíz "/", que sabemos que existe
    # y devuelve una respuesta 200 OK.
    healthCheckPath: /
    # --- FIN DE LA CORRECCIÓN CLAVE ---
    plan: free
    envVars:
      - fromGroup: secrets
      - key: DATABASE_URL
        fromDatabase:
          name: asistente-legal-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.5
      - key: CORS_ORIGINS
        value: "https://asistente-legal-frontend-8n9i.onrender.com,http://localhost:5173,http://127.0.0.1:5173"

  # 2. Frontend (React + Vite)
  - name: asistente-legal-frontend
    type: web
    runtime: static
    rootDir: ./frontend
    buildCommand: "npm install && npm run build"
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_URL_BASE_BACKEND
        value: "https://asistente-legal-backend-71ft.onrender.com"
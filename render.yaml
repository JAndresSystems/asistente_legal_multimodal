# render.yaml

# --- GRUPO DE VARIABLES DE ENTORNO (Secrets) ---
# =====================================================================
# CORRECCIÓN #1: Centralizamos las claves secretas en un grupo.
# Esto las hace disponibles durante la fase de 'build', solucionando el error.
# =====================================================================
envVarGroups:
  - name: secrets
    envVars:
      - key: GOOGLE_API_KEY
        sync: false # Marcar como sensitiva
      - key: JWT_SECRET_KEY
        sync: false # Marcar como sensitiva
      - key: RESEND_API_KEY
        sync: false # Marcar como sensitiva

databases:
  - name: asistente-legal-db
    databaseName: asistente_legal_db
    user: asistente_legal_user
    plan: free

services:
  # Redis/KeyValue Store
  - name: asistente-legal-redis
    type: keyvalue
    ipAllowList: []
    plan: free

  # 1. El Backend (API con FastAPI)
  - name: asistente-legal-backend
    type: web
    runtime: python
    # Se elimina 'rootDir' para que los comandos se ejecuten desde la raíz del proyecto.
    # Esto es NECESARIO para que las importaciones relativas y las rutas de archivos funcionen.
    buildCommand: "pip install -r requirements.txt"
    # CORRECCIÓN #2: Asegurarse de eliminar la carpeta de persistencia ANTES de iniciar el servidor.
    # Tambien ejecutamos la ingestión inicial aquí, justo antes de uvicorn.
    # Usamos '&&' para que los comandos se ejecuten en secuencia.
    # Primero eliminamos la carpeta persistente.
    # Luego, ejecutamos el script de ingestión SIEMPRE (esto debería ser seguro ahora que es autónomo).
    # Finalmente, iniciamos uvicorn.
    startCommand: "rm -rf chroma_db_data && python -m backend.scripts.ingestar_documentos && uvicorn backend.main:aplicacion --host 0.0.0.0 --port $PORT"
    healthCheckPath: /api/chat/healthcheck
    plan: free
    envVars:
      # CORRECCIÓN #3: Referenciamos el grupo de secretos.
      - fromGroup: secrets
      - key: DATABASE_URL
        fromDatabase:
          name: asistente-legal-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: asistente-legal-redis
          type: keyvalue
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.5
      # CORRECCIÓN #4: Usar la URL dinámica del frontend de Render
      - key: CORS_ORIGINS
        # El valor ahora es una cadena con URLs separadas por comas
        # Usamos la plantilla de Render para obtener la URL del frontend
        value: "https://{{ .Service.asistente-legal-frontend.Hostname }},http://localhost:5173,http://127.0.0.1:5173" # URL dinámica del frontend + locales para desarrollo

  # 2. El Worker de Celery para Tareas Asíncronas
  - name: celery-worker
    type: worker
    runtime: python
    # Se elimina 'rootDir' aquí también por la misma razón.
    buildCommand: "pip install -r requirements.txt"
    # CORRECCIÓN #2 para Worker: Asegurarse de eliminar la carpeta de persistencia ANTES de iniciar el worker (si el worker también usa ChromaDB).
    # Tambien ejecutamos la ingestión inicial aquí SIEMPRE (si el worker la necesita, aunque es menos común).
    # startCommand: "rm -rf chroma_db_data && python -m backend.scripts.ingestar_documentos && celery -A backend.tareas.celery_app worker --loglevel=info"
    # OPCIÓN 2: Eliminar carpeta y dejar que el worker inicie normalmente (si no usa ChromaDB directamente o lo inicializa como el backend).
    # Dado que el worker también podría necesitar acceder a la base de datos vectorial si procesa tareas que la usan,
    # es seguro eliminar la carpeta aquí tambien, pero el worker no debería intentar usarla antes de que el backend la llene.
    # Para evitar problemas, no eliminamos la carpeta ni ejecutamos ingestión en el worker a menos que sea absolutamente necesario.
    startCommand: "celery -A backend.tareas.celery_app worker --loglevel=info"
    plan: starter
    envVars:
      # CORRECCIÓN #3: Referenciamos el grupo de secretos aquí también.
      - fromGroup: secrets
      - key: DATABASE_URL
        fromDatabase:
          name: asistente-legal-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: asistente-legal-redis
          type: keyvalue
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.5

  # 3. El Frontend (Sitio Estático con React+Vite)
  - name: asistente-legal-frontend
    type: web
    runtime: static
    rootDir: ./frontend
    buildCommand: "npm install && npm run build"
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_URL_BASE_BACKEND
        # CORRECCIÓN #5: Usar la URL dinámica del backend de Render
        # Render NO resuelve plantillas .Service... en envVars de servicios 'static' durante el build.
        # Por lo tanto, DEBEMOS usar la URL FÍSICA real del backend aquí.
        # Reemplaza 'asistente-legal-backend-71ft.onrender.com' con la URL REAL de TU backend en Render.
        # Puedes encontrarla en la página de tu servicio backend en Render.
        value: "https://asistente-legal-backend-71ft.onrender.com" # URL FÍSICA del backend en Render
